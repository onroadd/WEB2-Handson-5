<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Daftar Kategori</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container main-content mt-4">

    <h1 th:text="${title}">Daftar Kategori</h1>

    <ul class="list-group mt-3">
        <li th:each="category : ${categories}" class="list-group-item d-flex justify-content-between align-items-center">
            <a th:href="@{/products/category/{cat}(cat=${category})}"
               th:text="${category}"
               class="text-decoration-none">Kategori</a>
            <span class="badge bg-primary rounded-pill"
                  th:text="${productService.countByCategory(category)}">0</span>
        </li>
    </ul>

    <div class="mt-3">
        <a th:href="@{/products}" class="btn btn-secondary">Kembali ke Produk</a>
    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>

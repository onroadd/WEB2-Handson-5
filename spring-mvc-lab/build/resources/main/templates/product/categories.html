<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Daftar Kategori</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#38bdf8'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-1">
    <section class="mx-auto max-w-4xl px-4 py-8">
        <div class="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-slate-50"
                    th:text="${title}">
                    Daftar Kategori
                </h1>
                <p class="mt-1 text-xs text-slate-400 sm:text-sm">
                    Lihat semua kategori yang tersedia beserta jumlah produknya.
                </p>
            </div>
        </div>

        <ul class="mt-5 space-y-3">
            <li th:each="category : ${categories}"
                class="flex items-center justify-between rounded-2xl border border-slate-800 bg-slate-950/80 px-4 py-3 text-sm shadow-sm shadow-slate-950/40 transition hover:-translate-y-0.5 hover:border-sky-500/60 hover:bg-slate-900">
                <div class="flex items-center gap-3">
                    <span class="h-2 w-2 rounded-full bg-sky-400"></span>
                    <a th:href="@{/products/category/{cat}(cat=${category})}"
                       th:text="${category}"
                       class="font-medium text-slate-100 hover:text-sky-300">
                        Kategori
                    </a>
                </div>
                <span class="inline-flex items-center rounded-full bg-sky-500/10 px-3 py-1 text-xs font-semibold text-sky-300">
                    <span th:text="${productService.countByCategory(category)}">0</span>
                    <span class="ml-1 text-slate-400">produk</span>
                </span>
            </li>
        </ul>

        <div class="mt-6">
            <a th:href="@{/products}"
               class="inline-flex items-center rounded-full border border-slate-700 bg-slate-900/80 px-4 py-2 text-xs font-medium text-slate-200 transition hover:border-sky-500/60 hover:bg-slate-900 sm:text-sm">
                ← Kembali ke Daftar Produk
            </a>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>

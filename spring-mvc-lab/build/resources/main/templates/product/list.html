<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Daftar Produk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#38bdf8'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-1">
    <section class="mx-auto max-w-6xl px-4 py-8">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-slate-50 sm:text-3xl"
                    th:text="${title}">
                    Daftar Produk
                </h1>
                <p class="mt-1 text-xs text-slate-400 sm:text-sm">
                    Cari, filter berdasarkan kategori, dan lihat detail produk.
                </p>
            </div>

            <form th:action="@{/products/search}" method="get"
                  class="mt-3 w-full max-w-md sm:mt-0">
                <label class="flex items-center gap-2 rounded-full border border-slate-700 bg-slate-900/70 px-3 py-1.5 shadow-sm ring-slate-500/40 focus-within:border-sky-500 focus-within:ring-1">
                    <span class="text-xs text-slate-500">
                        Cari
                    </span>
                    <input
                            type="text"
                            name="keyword"
                            placeholder="Nama produk..."
                            th:value="${keyword}"
                            class="w-full bg-transparent text-xs text-slate-100 placeholder:text-slate-500 focus:outline-none sm:text-sm"
                    />
                    <button
                            type="submit"
                            class="inline-flex items-center rounded-full bg-sky-500 px-3 py-1.5 text-xs font-semibold text-slate-950 shadow-sm shadow-sky-500/40 transition hover:bg-sky-400">
                        Cari
                    </button>
                </label>
            </form>
        </div>

        <div class="mt-4 flex flex-wrap items-center gap-2 text-xs text-slate-300">
            <span class="mr-1 text-slate-400">Filter cepat:</span>
            <a th:href="@{/products}"
               class="inline-flex items-center gap-1 rounded-full border border-slate-800 bg-slate-900/70 px-3 py-1.5 font-medium text-slate-200 transition hover:border-sky-500/60 hover:bg-slate-900">
                Semua
            </a>
            <a th:href="@{/products/category/Elektronik}"
               class="inline-flex items-center gap-1 rounded-full border border-sky-500/50 bg-sky-500/10 px-3 py-1.5 font-medium text-sky-300 transition hover:border-sky-400 hover:bg-sky-500/20">
                Elektronik
            </a>
            <a th:href="@{/products/category/Buku}"
               class="inline-flex items-center gap-1 rounded-full border border-emerald-500/50 bg-emerald-500/10 px-3 py-1.5 font-medium text-emerald-300 transition hover:border-emerald-400 hover:bg-emerald-500/20">
                Buku
            </a>
            <a th:href="@{/products/category/Makanan}"
               class="inline-flex items-center gap-1 rounded-full border border-amber-500/50 bg-amber-500/10 px-3 py-1.5 font-medium text-amber-300 transition hover:border-amber-400 hover:bg-amber-500/20">
                Makanan
            </a>
        </div>

        <p class="mt-3 text-xs text-slate-400 sm:text-sm">
            Menampilkan
            <span class="font-semibold text-sky-300" th:text="${totalProducts}">0</span>
            produk
        </p>

        <div th:if="${!products.isEmpty()}"
             class="mt-5 overflow-hidden rounded-2xl border border-slate-800 bg-slate-950/70 shadow-xl shadow-slate-950/40">
            <table class="min-w-full divide-y divide-slate-800 text-xs sm:text-sm">
                <thead class="bg-slate-950/80 text-slate-400">
                <tr>
                    <th class="px-4 py-3 text-left font-medium">No</th>
                    <th class="px-4 py-3 text-left font-medium">Nama Produk</th>
                    <th class="px-4 py-3 text-left font-medium">Kategori</th>
                    <th class="px-4 py-3 text-right font-medium">Harga</th>
                    <th class="px-4 py-3 text-center font-medium">Stok</th>
                    <th class="px-4 py-3 text-right font-medium">Aksi</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-800">
                <tr th:each="product, iterStat : ${products}"
                    class="group transition hover:bg-slate-900/70">
                    <td class="whitespace-nowrap px-4 py-3 text-slate-400"
                        th:text="${iterStat.count}">
                        1
                    </td>
                    <td class="whitespace-nowrap px-4 py-3 font-medium text-slate-100"
                        th:text="${product.name}">
                        Nama
                    </td>
                    <td class="whitespace-nowrap px-4 py-3">
                        <a th:href="@{/products/category/{cat}(cat=${product.category})}"
                           th:text="${product.category}"
                           class="inline-flex items-center rounded-full bg-slate-800/80 px-2.5 py-1 text-[11px] font-medium text-slate-200 transition group-hover:bg-slate-700">
                            Kategori
                        </a>
                    </td>
                    <td class="whitespace-nowrap px-4 py-3 text-right text-slate-100"
                        th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                        Rp 0
                    </td>
                    <td class="whitespace-nowrap px-4 py-3 text-center">
                        <span th:text="${product.stock}"
                              th:classappend="${product.stock < 20} ? ' text-red-400 font-semibold' : ' text-emerald-400'">
                            0
                        </span>
                    </td>
                    <td class="whitespace-nowrap px-4 py-3 text-right">
                        <a th:href="@{/products/{id}(id=${product.id})}"
                           class="inline-flex items-center rounded-full border border-sky-500/60 bg-sky-500/10 px-3 py-1.5 text-[11px] font-medium text-sky-300 shadow-sm shadow-sky-500/30 transition hover:-translate-y-0.5 hover:border-sky-400 hover:bg-sky-500/20">
                            Detail
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${products.isEmpty()}"
             class="mt-6 rounded-2xl border border-amber-500/40 bg-amber-500/5 px-4 py-4 text-sm text-amber-200">
            Tidak ada produk yang ditemukan.
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>

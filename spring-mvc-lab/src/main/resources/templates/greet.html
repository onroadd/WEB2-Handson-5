<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Greeting</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#38bdf8'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center">
<div
        class="w-full max-w-md rounded-3xl border border-slate-800 bg-slate-950/80 px-6 py-7 text-center shadow-xl shadow-slate-950/60">
    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-400">
        Greeting Demo
    </p>
    <h1 class="mt-3 text-2xl font-semibold tracking-tight text-slate-50"
        th:text="${greeting}">
        Greeting
    </h1>
    <p class="mt-2 text-xs text-slate-400">
        Nilai ini berasal dari parameter URL menggunakan
        <span class="font-semibold text-slate-200">@RequestParam</span>
        dan
        <span class="font-semibold text-slate-200">@PathVariable</span>.
    </p>
    <div class="mt-5">
        <a th:href="@{/}"
           class="inline-flex items-center rounded-full border border-slate-700 bg-slate-900/80 px-4 py-2 text-xs font-medium text-slate-200 transition hover:border-sky-500/60 hover:bg-slate-900">
            ← Kembali ke Beranda
        </a>
    </div>
</div>
</body>
</html>

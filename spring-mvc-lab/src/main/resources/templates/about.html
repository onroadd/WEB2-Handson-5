<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">About</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container main-content mt-4">
    <h1 th:text="${appName}">Spring MVC Lab</h1>
    <p class="lead">Versi <span th:text="${version}">1.0</span></p>
    <p>Dikembangkan oleh <strong th:text="${author}">Author</strong></p>

    <h5 class="mt-4">Teknologi yang Digunakan:</h5>
    <ul>
        <li th:each="tech : ${technologies}" th:text="${tech}">Technology</li>
    </ul>

    <div class="mt-3">
        <a th:href="@{/}" class="btn btn-secondary">Kembali ke Home</a>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>

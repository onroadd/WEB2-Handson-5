<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Statistik</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container main-content mt-4">

    <h1 th:text="${title}">Statistik</h1>

    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card mb-3">
                <div class="card-header">Ringkasan</div>
                <div class="card-body">
                    <p><strong>Total Produk:</strong> <span th:text="${totalProducts}">0</span></p>
                    <p><strong>Produk Stok Rendah (&lt;20):</strong>
                        <span th:text="${lowStockCount}" class="text-danger">0</span>
                    </p>
                    <p><strong>Rata-rata Harga:</strong>
                        <span th:text="'Rp ' + ${#numbers.formatDecimal(averagePrice, 0, 'COMMA', 0, 'POINT')}">Rp 0</span>
                    </p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card mb-3">
                <div class="card-header">Produk Termahal</div>
                <div class="card-body" th:if="${mostExpensive != null}">
                    <p><strong th:text="${mostExpensive.name}">-</strong></p>
                    <p th:text="'Rp ' + ${#numbers.formatDecimal(mostExpensive.price, 0, 'COMMA', 0, 'POINT')}">Rp 0</p>
                </div>
                <div class="card-body" th:if="${mostExpensive == null}">-</div>
            </div>
            <div class="card mb-3">
                <div class="card-header">Produk Termurah</div>
                <div class="card-body" th:if="${cheapest != null}">
                    <p><strong th:text="${cheapest.name}">-</strong></p>
                    <p th:text="'Rp ' + ${#numbers.formatDecimal(cheapest.price, 0, 'COMMA', 0, 'POINT')}">Rp 0</p>
                </div>
                <div class="card-body" th:if="${cheapest == null}">-</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Produk per Kategori</div>
        <div class="card-body">
            <table class="table">
                <thead>
                    <tr>
                        <th>Kategori</th>
                        <th>Jumlah Produk</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entry : ${productCountByCategory}">
                        <td th:text="${entry.key}">Kategori</td>
                        <td th:text="${entry.value}">0</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/}" class="btn btn-secondary">Kembali ke Home</a>
    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
